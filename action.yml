name: "caretta-autopilot"
description: "Evaluate repository state and execute the appropriate autopilot run (work dispatch or factory cycle)."
author: "geoffsee"
branding:
  icon: "navigation"
  color: "purple"

inputs:
  caretta-version:
    description: "Version of caretta to install. Defaults to 'latest'."
    required: false
    default: "latest"
  agent:
    description: "Agent to use for caretta tasks (e.g. 'claude')."
    required: false
    default: "claude"
  context:
    description: "Natural-language steering context."
    required: false
    default: "Autopilot scheduled evaluation of open issues and pull requests."
  dry-run:
    description: "Evaluate and report without executing caretta or dispatching CI."
    required: false
    default: "false"
  enable-dispatch:
    description: "When false, evaluate and classify only; do not call any workflow_dispatch or execute caretta."
    required: false
    default: "true"
  github-token:
    description: "Token used for GitHub API calls. Defaults to the workflow's GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}
  ci-workflow:
    description: "Workflow file dispatched per agent PR to attach a Test check to the head SHA."
    required: false
    default: "ci.yml"
  test-check-name:
    description: "Gate check name (matches exact, or GitHub Actions' \"Workflow / job\" name such as CI / Test when set to the job id Test)."
    required: false
    default: "Test"
  git-user-name:
    description: "Git author/committer name used when caretta creates commits."
    required: false
    default: "caretta-autopilot[bot]"
  git-user-email:
    description: "Git author/committer email used when caretta creates commits."
    required: false
    default: "caretta-autopilot[bot]@users.noreply.github.com"

outputs:
  route:
    description: "Selected route: 'work' or 'factory'."
  tracker:
    description: "Sprint issue number used as tracker input, when a sprint was found."
  sprint:
    description: "Same as tracker; preserved for compatibility."
  open_issue_count:
    description: "Number of open issues."
  open_pr_count:
    description: "Number of open pull requests."
  stale_pr_count:
    description: "Non-draft PRs whose review decision is CHANGES_REQUESTED or REVIEW_REQUIRED."
  reason:
    description: "Human-readable reason for the route selection."
  pending_count:
    description: "Agent PRs that need a Test check on their head SHA."
  dispatched_count:
    description: "CI dispatches initiated this run."
  active_count:
    description: "Agent PRs already running/queued CI for their head SHA."
  current_count:
    description: "Agent PRs whose head SHA already has a Test check."
  failed_count:
    description: "Agent PRs whose CI dispatch attempt failed."
  hold_target:
    description: "True when execution was held this pass."
  target_dispatched:
    description: "Outcome: 'executed' or 'skipped'."

runs:
  using: "node20"
  main: "dist/index.js"
